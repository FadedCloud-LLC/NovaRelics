ability-teleport-success: "<prefix> <aqua>Teleported!"
ability-heal-success: "<prefix> <red>❤ <green>Healed <yellow><amount></yellow> hearts."
ability-feed-success: "<prefix> <gold>Hunger restored."
ability-no-target: "<prefix> <red>No valid target found."
ability-prevent-death: "<prefix> <red>Your relic saved your life!"
ability-vein-mine: "<prefix> <gray>Vein mined <yellow><count></yellow> blocks."
ability-tree-feller: "<prefix> <gray>Felled <yellow><count></yellow> logs."

drop-announce: "<prefix> <yellow><player></yellow> found a <rarity_color><bold><relic></bold><yellow>!"
